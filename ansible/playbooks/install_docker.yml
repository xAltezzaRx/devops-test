- name: Install Docker playbook
  hosts: web
  become: true

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true

    - name: Install docker package
      ansible.builtin.apt:
        name: docker.io
        state: present

    - name: Enable docker service
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started
